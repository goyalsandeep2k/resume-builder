function companyLogo(name) {

}

}

        <div class="r-section-title" style="margin-top:12px">Certifications</div>
        <div class="r-cert-tags">${certs.map(c => `<span class="r-cert-tag">${c}</span>`).join('')}</div>

        <div class="r-section-title" style="margin-top:12px">Tools &amp; Platforms</div>
        <div class="r-tool-tags">${tools.map(t => `<span class="r-tool-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="resume">
    <div class="r-header" style="padding:10px 24px">
      <div class="r-header-text">
        <div class="r-name" style="font-size:22px">SANDEEP GOYAL</div>
        <div class="r-tagline">Experience (continued)</div>
      </div>
    </div>
    <div class="r-body">
      <div class="r-left">
        <div class="r-section-title">Experience (continued)</div>
        ${jobs.slice(3).map(jobHTML).join('')}
      </div>
      <div class="r-right">
        <div class="r-section-title">Core Strengths</div>
        <div class="r-cert-tags" style="margin-bottom:12px">
          ${coreStrengths.map(s => `<span class="r-cert-tag">${s}</span>`).join('')}
        </div>
        <div class="r-section-title">Core Competencies</div>
        <ul style="padding:0">
          ${comps.map(c => `<li style="font-family:Arial,sans-serif;font-size:10.6px;color:#333;padding:1.5px 0 1.5px 12px;position:relative;list-style:none"><span style="position:absolute;left:0;color:#0a3161">▸</span>${c}</li>`).join('')}
        </ul>
      </div>
    </div>
  </div>
`;

function exportPDF() {
  const btn = event.target;
  btn.textContent = 'Generating…';
  btn.disabled = true;
  const el = document.getElementById('resume-preview');
  html2pdf().set({
    margin: 0,
    filename: 'SandeepGoyal_Resume.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' }
  }).from(el).save().then(() => {
    btn.textContent = '⬇ Download PDF';
    btn.disabled = false;
  });
}
</script>
</body>
</html>
